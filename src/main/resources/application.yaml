spring:
  application:
    name: AdvancedRetailBillingApp
  datasource:
    password: ${DB_PASSWORD}
    username: ${DB_USER}
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          secret: ${JWT_SECRET}
          expiration-ms: 86400000

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID}
    secret: ${RAZORPAY_KEY_SECRET}
app:
  low-stock-threshold: 5
  order-number-prefix: INV